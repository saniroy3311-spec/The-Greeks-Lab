<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRONOS · GREEKS LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* THEME TOKENS */
:root {
  --bg:      #06101C;
  --surface: #0A1828;
  --border:  #132030;
  --text:    #B8D8EE;
  --muted:   #3A6070;
  --accent:  #1D9E75;
  --up:      #1D9E75;
  --down:    #E84B4B;
  --warn:    #E8A93A;
  --pred:    #5B8FFF;
}
body.light {
  --bg:      #EEF4FB;
  --surface: #FFFFFF;
  --border:  #C8DCF0;
  --text:    #0C447C;
  --muted:   #6B8FAA;
  --accent:  #185FA5;
  --up:      #0D7A5E;
  --down:    #C0392B;
  --warn:    #B07A00;
  --pred:    #2962FF;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border)}
::-webkit-scrollbar-track{background:transparent}

/* TOPBAR */
#topbar{
  height:46px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
  user-select:none;position:relative;z-index:20;
}
#logo{font-size:12px;font-weight:700;letter-spacing:.1em;white-space:nowrap;color:var(--text)}
#logo b{color:var(--accent)}
.sep{width:1px;background:var(--border);height:20px;flex-shrink:0;margin:0 3px}
.badge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;letter-spacing:.08em;white-space:nowrap}
.badge-live{background:var(--accent);color:#fff}
.badge-wait{background:var(--warn);color:#000}
#sym-sel{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:3px 8px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;outline:none}
.tb-group{display:flex;flex-direction:column;gap:1px}
.tb-lbl{font-size:8px;font-weight:600;color:var(--muted);letter-spacing:.09em}
.tb-val{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text)}
#tb-price{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--text)}
#tb-chg{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;min-width:60px}
.up{color:var(--up)} .dn{color:var(--down)}
.tf-group{display:flex;gap:2px}
.tf{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 8px;cursor:pointer;transition:all .12s;letter-spacing:.04em}
.tf:hover{color:var(--text);border-color:var(--muted)}
.tf.on{background:var(--accent);color:#fff;border-color:var(--accent)}
#clock{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text);margin-left:auto;white-space:nowrap}
.theme-grp{display:flex;gap:2px}
.th-btn{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 8px;cursor:pointer;letter-spacing:.06em;transition:all .12s}
.th-btn.on{background:var(--surface);color:var(--text);border-color:var(--muted)}

/* MAIN LAYOUT */
#main{display:flex;height:calc(100vh - 46px);width:100%;overflow:hidden}

/* LEFT PANEL */
#lp{width:280px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.lp-hdr{padding:7px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lp-hdr-title{font-size:8px;font-weight:700;letter-spacing:.1em;color:var(--muted)}
.pretrade-badge{font-size:7px;font-weight:700;background:var(--border);color:var(--muted);padding:2px 6px;letter-spacing:.06em}

/* VERDICT */
#v-box{margin:7px 8px;padding:9px 10px;border-left:3px solid var(--warn);background:rgba(232,169,58,.06);flex-shrink:0}
#v-box.buy{border-left-color:var(--up);background:rgba(29,158,117,.06)}
#v-box.sell{border-left-color:var(--down);background:rgba(232,75,75,.06)}
#v-title{font-size:13px;font-weight:700;letter-spacing:.03em;margin-bottom:3px}
#v-title.buy{color:var(--up)} #v-title.sell{color:var(--down)} #v-title.skip{color:var(--warn)}
#v-reason{font-size:9px;color:var(--muted);line-height:1.5}

/* SECTIONS */
.lp-sec{padding:7px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sec-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;color:var(--muted)}
.sec-val{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700}
.bar-track{width:100%;height:3px;background:var(--border)}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--down),var(--warn) 50%,var(--up));transition:width .5s}

/* FORECAST CARDS */
.fc-row{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;margin-top:5px}
.fc-card{flex-shrink:0;width:48px;background:var(--bg);border:1px solid var(--border);padding:5px 3px;text-align:center}
.fc-lbl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--muted);margin-bottom:2px}
.fc-arr{font-size:11px;margin-bottom:2px}
.fc-price{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700}
.fc-pct{font-family:'IBM Plex Mono',monospace;font-size:7px;margin-top:1px}

/* GATES */
.gate{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:50px}
.gate-n{width:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);border-right:1px solid var(--border)}
.gate.pass .gate-n{border-left:2px solid var(--up)}
.gate.fail .gate-n{border-left:2px solid var(--down)}
.gate-body{flex:1;padding:5px 9px;display:flex;flex-direction:column;justify-content:center}
.gate-name{font-size:8px;font-weight:700;letter-spacing:.09em;color:var(--muted)}
.gate-thr{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--muted);margin-top:1px}
.gate-gbar{width:100%;height:2px;background:var(--border);margin-top:4px}
.gate-gfill{height:100%;transition:width .4s}
.gate-gfill.pass{background:var(--up)} .gate-gfill.fail{background:var(--down)}
.gate-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:5px 8px;gap:3px}
.gate-val{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700}
.gate-badge{font-size:7px;font-weight:700;padding:2px 5px;letter-spacing:.07em}
.gate-badge.pass{background:rgba(29,158,117,.12);color:var(--up)}
.gate-badge.fail{background:rgba(232,75,75,.10);color:var(--down)}

/* SCORE BOX */
#score-box{margin:7px 8px 10px;padding:10px;border:1px solid var(--border);flex-shrink:0}
#score-box.buy{border-color:var(--up);background:rgba(29,158,117,.05)}
#score-box.sell{border-color:var(--down);background:rgba(232,75,75,.05)}
#score-box.skip{border-color:var(--warn);background:rgba(232,169,58,.05)}
.score-top{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
#score-n{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700}
#score-n.buy{color:var(--up)} #score-n.sell{color:var(--down)} #score-n.skip{color:var(--warn)}
#score-lbl{font-size:10px;font-weight:700;letter-spacing:.02em}
#score-why{font-size:9px;color:var(--muted);line-height:1.5}

/* RIGHT PANEL — CHART */
#rp{flex:1;min-width:0;height:100%;background:var(--bg);position:relative;overflow:hidden}
#rcon{display:none;position:absolute;top:0;left:0;right:0;background:var(--warn);color:#000;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;padding:3px;z-index:100;letter-spacing:.07em}
#rcon.on{display:block}
#err{display:none;position:absolute;top:6px;left:6px;right:6px;background:rgba(232,75,75,.1);color:var(--down);font-size:10px;padding:6px 8px;z-index:50;border:1px solid var(--down)}
#chart-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:10;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em}
#chart-loading.gone{display:none}
</style>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="logo">KRONOS · <b>GREEKS LAB</b></div>
  <div class="sep"></div>
  <span class="badge badge-live" id="status-badge">LIVE</span>
  <div class="sep"></div>
  <select id="sym-sel">
    <option value="BTC">BTC/USDT</option>
    <option value="NIFTY">NIFTY</option>
    <option value="BANKNIFTY">BNKN</option>
  </select>
  <div class="sep"></div>
  <span id="tb-price">—</span>
  <span id="tb-chg"></span>
  <div class="sep"></div>
  <div class="tf-group">
    <button class="tf on" data-tf="1m">1m</button>
    <button class="tf"    data-tf="3m">3m</button>
    <button class="tf"    data-tf="5m">5m</button>
    <button class="tf"    data-tf="15m">15m</button>
    <button class="tf"    data-tf="30m">30m</button>
    <button class="tf"    data-tf="1h">1H</button>
  </div>
  <div class="sep"></div>
  <div class="tb-group">
    <span class="tb-lbl">FEED</span>
    <span class="tb-val" id="feed-lbl">Delta</span>
  </div>
  <div class="sep"></div>
  <div class="tb-group">
    <span class="tb-lbl">WINDOW</span>
    <span class="tb-val" id="window-lbl">1m</span>
  </div>
  <div id="clock">—</div>
  <div class="theme-grp">
    <button class="th-btn on" id="btn-dark"  onclick="setThm('dark')">● DARK</button>
    <button class="th-btn"    id="btn-light" onclick="setThm('light')">○ LIGHT</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT PANEL -->
  <div id="lp">
    <div class="lp-hdr">
      <span class="lp-hdr-title">■ EXECUTION GATEKEEPER LOGIC</span>
      <span class="pretrade-badge">PRE-TRADE</span>
    </div>

    <div id="v-box">
      <div id="v-title" class="skip">⏸ WAIT / SKIP</div>
      <div id="v-reason">Connecting to backend…</div>
    </div>

    <div class="lp-sec">
      <div class="sec-row">
        <span class="sec-lbl">■ SIGNAL STRENGTH</span>
        <span class="sec-val" id="sig-pct">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="sig-bar" style="width:0%"></div></div>
    </div>

    <div class="lp-sec">
      <div class="sec-row">
        <span class="sec-lbl">■ 5-CANDLE FORECAST</span>
        <span class="sec-lbl" id="fc-window">—</span>
      </div>
      <div class="fc-row" id="fc-cards"></div>
    </div>

    <div id="gates"></div>

    <div id="score-box" class="skip">
      <div class="score-top">
        <span id="score-n" class="skip">0/5</span>
        <span id="score-lbl">VERDICT — SKIP EXECUTION</span>
      </div>
      <div id="score-why">Loading analysis…</div>
    </div>
  </div>

  <!-- RIGHT PANEL — CHART fills all remaining width -->
  <div id="rp">
    <div id="rcon">⚡ RECONNECTING TO LIVE FEED…</div>
    <div id="err"></div>
    <div id="chart-loading">LOADING MARKET DATA…</div>
  </div>

</div>

<script type="module">
import { createChartEngine } from '/static/candl-charts.js';

const TF_MS  = {'1m':60000,'3m':180000,'5m':300000,'15m':900000,'30m':1800000,'1h':3600000};
const TF_MIN = {'1m':1,'3m':3,'5m':5,'15m':15,'30m':30,'1h':60};

let sym = 'BTC', tf = '1m', theme = 'dark';
let chart = null, candles = [], lastData = null;
let sio = null, sioRoom = null;
let loadSeq = 0, loadInflight = 0;

const $ = id => document.getElementById(id);

function fmt(v, d=2) {
  if (v==null||!isFinite(v)) return '—';
  return v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtPct(v,d=2) {
  if (v==null||!isFinite(v)) return '—';
  return (v>=0?'+':'')+v.toFixed(d)+'%';
}
function priceDec() { return sym==='BTC'?1:2; }

/* Clock */
function tickClock() {
  $('clock').textContent = new Intl.DateTimeFormat('en-US',{
    timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false
  }).format(new Date());
}
setInterval(tickClock,1000); tickClock();

/* Theme */
window.setThm = function(t) {
  theme=t;
  document.body.className = t==='light'?'light':'';
  $('btn-dark').className  = 'th-btn'+(t==='dark' ?' on':'');
  $('btn-light').className = 'th-btn'+(t==='light'?' on':'');
  if(chart) chart.setTheme(t);
};

/* Chart */
function initChart() {
  if(chart){chart.destroy();chart=null;}
  chart = createChartEngine($('rp'),{theme,pricePrecision:priceDec(),chartType:'candle'});
}

/* EMA overlay from backend data */
function applyEMA(combined) {
  if(!chart||!lastData) return;
  const ef = lastData.ema_fast||[], es = lastData.ema_slow||[];
  const m5  = new Map(ef.map(e=>[e.time*1000,e.value]));
  const m10 = new Map(es.map(e=>[e.time*1000,e.value]));
  chart.setIndicators([
    {id:'ema5', label:'EMA 5', placement:'overlay',
     outputs:[{name:'ema5', values:combined.map(c=>m5.get(c.time)??NaN),  color:'#1D9E75',style:'line'}]},
    {id:'ema10',label:'EMA 10',placement:'overlay',
     outputs:[{name:'ema10',values:combined.map(c=>m10.get(c.time)??NaN), color:'#FF8C42',style:'line'}]}
  ]);
}

/* Topbar price */
function setPrice(close,open) {
  $('tb-price').textContent = fmt(close,priceDec());
  if(open&&open>0){
    const pct=(close-open)/open*100;
    const el=$('tb-chg');
    el.textContent=fmtPct(pct);
    el.className=pct>=0?'up':'dn';
  }
}

/* Socket.IO */
function initSIO() {
  if(sio) return;
  sio=io(location.origin,{transports:['websocket','polling'],reconnection:true,
    reconnectionDelay:1000,reconnectionDelayMax:5000,reconnectionAttempts:Infinity});
  sio.on('connect',()=>{
    $('status-badge').textContent='LIVE';
    $('status-badge').className='badge badge-live';
    $('rcon').classList.remove('on');
    if(sioRoom) sio.emit('subscribe',sioRoom);
  });
  sio.on('disconnect',()=>{
    $('status-badge').textContent='WAIT';
    $('status-badge').className='badge badge-wait';
    $('rcon').classList.add('on');
  });
  sio.on('tick',onTick);
}

function subscribe() {
  if(!sio) initSIO();
  if(sioRoom) sio.emit('unsubscribe',sioRoom);
  sioRoom={symbol:sym,timeframe:tf};
  sio.emit('subscribe',sioRoom);
}

/* Tick handler — live candle updates */
function onTick(d) {
  if(d.symbol!==sym||d.timeframe!==tf) return;
  if(!chart||loadInflight>0) return;
  const bMs=TF_MS[tf]||60000;
  const t=Math.floor(d.time/(bMs/1000))*(bMs/1000);
  if(!d.open||!d.close||d.close<=0) return;
  const c={time:t*1000,open:d.open,high:d.high,low:d.low,close:d.close,volume:d.volume||0};
  let closed=false;
  if(candles.length>0){const last=candles[candles.length-1];if(c.time>=last.time+bMs)closed=true;}
  if(candles.length===0) candles.push(c);
  else if(c.time===candles[candles.length-1].time) candles[candles.length-1]=c;
  else if(c.time>candles[candles.length-1].time)   candles.push(c);
  chart.updateLast(candles[candles.length-1]);
  const first=candles[0];
  setPrice(c.close,first?first.open:c.open);
  if(closed) setTimeout(()=>load(false,true),1500);
}

/* Gatekeeper panel renderer — reads real backend fields */
function renderGK(d) {
  const dir     = d.kronos_direction      || 'Flat';
  const conf    = d.kronos_confidence     || 0;
  const movePct = d.kronos_move_pct       || 0;
  const dec     = d.decision              || 'SKIP';
  const skips   = d.skip_reasons          || [];
  const wr      = d.echo_win_rate         ?? 0;
  const ec      = d.echo_count            ?? 0;
  const eup     = d.echo_up_count         ?? 0;
  const asymL   = d.echo_asymmetry_long   ?? 0;
  const asymS   = d.echo_asymmetry_short  ?? 0;
  const preds   = d.predicted             || [];
  const cur     = d.current               || 0;
  const tfMin   = TF_MIN[tf]              || 5;

  /* Verdict */
  const vBox=$('v-box'),vTitle=$('v-title'),vReason=$('v-reason');
  if(dec==='BUY'){
    vBox.className='buy';vTitle.className='buy';
    vTitle.textContent='▲ LONG — EXECUTE';
    vReason.textContent=`Kronos ${dir} · Conf ${conf}% · Move ${fmtPct(movePct)} · All gates cleared.`;
  } else if(dec==='SELL'){
    vBox.className='sell';vTitle.className='sell';
    vTitle.textContent='▼ SHORT — EXECUTE';
    vReason.textContent=`Kronos ${dir} · Conf ${conf}% · Move ${fmtPct(movePct)} · All gates cleared.`;
  } else {
    vBox.className='';vTitle.className='skip';
    vTitle.textContent='⏸ WAIT / SKIP';
    vReason.textContent=skips.length>0
      ?skips[0]
      :`Kronos confidence ${conf}% < 80 threshold.\nAll 5 gates must clear before routing.`;
  }

  /* Signal strength */
  $('sig-pct').textContent=conf+'%';
  $('sig-bar').style.width=Math.min(conf,100)+'%';

  /* Forecast cards */
  const fc=$('fc-cards'); fc.innerHTML='';
  const n=Math.min(preds.length,5);
  $('fc-window').textContent=n>0?`Next ${n*tfMin}m · LSTM`:'—';
  for(let i=0;i<n;i++){
    const p=preds[i];
    const pct=cur>0?(p.close-cur)/cur*100:0;
    const up=p.close>=cur;
    const col=up?'var(--up)':'var(--down)';
    const card=document.createElement('div');
    card.className='fc-card';
    card.innerHTML=
      `<div class="fc-lbl">+${(i+1)*tfMin}m</div>`+
      `<div class="fc-arr" style="color:${col}">${up?'▲':'▼'}</div>`+
      `<div class="fc-price" style="color:${col}">${fmt(p.close,0)}</div>`+
      `<div class="fc-pct" style="color:${col}">${fmtPct(pct)}</div>`;
    fc.appendChild(card);
  }

  /* Gate definitions */
  const isLong=dir==='Long',isShort=dir==='Short';
  const lastC=candles.length>0?candles[candles.length-1]:null;
  const isGreen=lastC&&lastC.close>lastC.open;
  const isRed  =lastC&&lastC.close<lastC.open;

  const gateDefs=[
    {name:'AI CONFIDENCE',   thr:'≥ 80%',
     val:conf+'%',           barPct:Math.min(conf,100),        pass:conf>=80},
    {name:'HISTORICAL EDGE', thr:isShort?'≤ 20%':'≥ 80%',
     val:`${Math.round(wr*100)}% (${eup}/${ec})`,
     barPct:Math.min(wr*100,100),                              pass:isShort?wr<=0.20:wr>=0.80},
    {name:'RISK / REWARD',   thr:'≥ 3.0x',
     val:(isShort?asymS:asymL).toFixed(2)+'x',
     barPct:Math.min((isShort?asymS:asymL)/5*100,100),        pass:(isShort?asymS:asymL)>=3.0},
    {name:'EXPECTED MOVE',   thr:'≥ 0.40%',
     val:Math.abs(movePct).toFixed(2)+'%',
     barPct:Math.min(Math.abs(movePct)/1.0*100,100),          pass:Math.abs(movePct)>=0.40},
    {name:'CANDLE CLOSE',    thr:'closed',
     val:isLong?(isGreen?'green':'red'):isShort?(isRed?'red':'green'):'—',
     barPct:0,                                                 pass:isLong?!!isGreen:isShort?!!isRed:false},
  ];

  const gEl=$('gates'); gEl.innerHTML='';
  let passCount=0;
  gateDefs.forEach((g,i)=>{
    if(g.pass)passCount++;
    const cls=g.pass?'pass':'fail';
    const row=document.createElement('div');
    row.className=`gate ${cls}`;
    row.innerHTML=
      `<div class="gate-n">${i+1}</div>`+
      `<div class="gate-body">`+
        `<div class="gate-name">${g.name}</div>`+
        `<div class="gate-thr">${g.thr}</div>`+
        `<div class="gate-gbar"><div class="gate-gfill ${cls}" style="width:${g.barPct}%"></div></div>`+
      `</div>`+
      `<div class="gate-right">`+
        `<span class="gate-val" style="color:var(--${g.pass?'up':'down'})">${g.val}</span>`+
        `<span class="gate-badge ${cls}">${g.pass?'PASS':'FAIL'}</span>`+
      `</div>`;
    gEl.appendChild(row);
  });

  /* Score box */
  const sb=$('score-box'),sn=$('score-n'),sl=$('score-lbl'),sw=$('score-why');
  const scls=dec==='BUY'?'buy':dec==='SELL'?'sell':'skip';
  sb.className=scls; sn.className=scls; sn.textContent=passCount+'/5';
  if(dec==='BUY'){
    sl.textContent='VERDICT — LONG EXECUTION';
    sw.textContent=`All ${passCount} gates cleared. Kronos aligned Long at ${conf}% confidence.`;
  } else if(dec==='SELL'){
    sl.textContent='VERDICT — SHORT EXECUTION';
    sw.textContent=`All ${passCount} gates cleared. Kronos aligned Short at ${conf}% confidence.`;
  } else {
    sl.textContent='VERDICT — SKIP EXECUTION';
    sw.textContent=skips.length>0
      ?'Insufficient confluence. '+skips.slice(0,2).join('. ')+'.'
      :'Insufficient confluence. Entry blocked until gates pass.';
  }
}

/* Main data load — calls real backend API */
async function load(isFirst=false,isBg=false) {
  const mySym=sym,myTf=tf,mySeq=++loadSeq;
  loadInflight++;
  if(isFirst&&!chart) initChart();
  if(isFirst) $('chart-loading').classList.remove('gone');
  $('err').style.display='none';
  $('window-lbl').textContent=myTf;

  try {
    const res=await fetch(`/api/a1/${mySym}/${myTf}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const d=await res.json();
    if(d.error) throw new Error(d.error);
    if(!d.candles||!d.predicted) throw new Error('Invalid response from server');
    if(mySeq!==loadSeq||sym!==mySym||tf!==myTf) return;

    lastData=d;

    candles=d.candles.map(c=>({
      time:c.time*1000,open:c.open,high:c.high,low:c.low,close:c.close,volume:c.volume||0
    }));

    const preds=d.predicted
      .map(p=>({time:p.time*1000,open:p.open,high:p.high,low:p.low,close:p.close,volume:0,isPrediction:true}))
      .filter(p=>candles.length===0||p.time>candles[candles.length-1].time);

    const combined=[...candles,...preds];
    if(!chart) initChart();
    chart.setData(combined);
    applyEMA(combined);

    if(d.current&&candles.length>0) setPrice(d.current,candles[0].open);
    $('feed-lbl').textContent=sym==='BTC'?'Delta':'NSE';

    renderGK(d);
    subscribe();

  } catch(e) {
    if(mySeq===loadSeq){
      const el=$('err');
      el.textContent='Error: '+e.message;
      el.style.display='block';
    }
  } finally {
    loadInflight=Math.max(0,loadInflight-1);
    $('chart-loading').classList.add('gone');
  }
}

/* Controls */
$('sym-sel').addEventListener('change',function(){sym=this.value;load(true);});
document.querySelectorAll('.tf').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tf').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');
    tf=this.dataset.tf;
    load(true);
  });
});
window.addEventListener('resize',()=>{if(chart)chart.resize();});
window.addEventListener('visibilitychange',()=>{
  if(!document.hidden){if(sio&&!sio.connected)sio.connect();if(loadInflight===0)load(false,true);}
});

/* Boot */
initChart();
initSIO();
load(true);
</script>
